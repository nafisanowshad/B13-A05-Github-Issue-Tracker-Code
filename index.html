<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Signin</title>

    <!-- favicon connect -->
    <link rel="shortcut icon" href="./assets/icon-fav.png" type="image/x-icon">

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style.css">

    <!-- tailwind+daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>
    <section class=" signIn-container w-10/12 sm:w-8/12 lg:w-6/12 mx-auto mt-14 mb-14 p-8 rounded-lg border-gray-100 shadow-lg">

        <div class=" flex justify-center items-center mb-6">
            <img src="./assets/github-logo.png" alt="">
        </div>
        <h2 class=" text-[#000000] font-semibold text-2xl mb-1 text-center">GitHub Issues Tracker</h2>
        <p class=" text-[#64748B] mb-6 text-center">Sign in to manage your issues</p>

        <h3 class=" text-[#1F2937] font-medium mb-2">Username</h3>
        <input type="text" id="user" class=" text-[#64748B] p-1 rounded-sm w-full border-2 border-gray-300 mb-[6px]"
            required placeholder="Enter Username" maxlength="5" />
        <p class=" text-[#4A00FF] text-sm mb-4">Default: admin</p>

        <h3 class=" text-[#1F2937] font-medium mb-2">Password</h3>
        <input type="password" id="pass" class=" text-[#64748B] p-1 w-full rounded-sm border-2 border-gray-300 mb-[6px]"
            required placeholder="Enter Password" minlength="8" />
        <p class=" text-[#4A00FF] text-sm mb-4">Default: admin123</p>

        <button onclick="handleLogin()" class="btn btn-soft w-full bg-[#4a00ff] text-white hover:brightness-90">Sign In</button>

        <div class=" flex items-center mb-6">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-4 text-[#1F2937]">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <h2 class=" text-[#64748B] text-center mb-2">Demo Credentials:</h2>

        <div class="text-center p-6 bg-[#F8FAFC]">
            <h3 class="text-[#1F2937]"><span class="font-semibold">Username:</span> admin</h3>
            <h3 class="text-[#1F2937]"><span class="font-semibold">Password:</span> admin123</h3>
        </div>
        
    </section>

    <!-- js file connect -->
    <script src="./script.js"></script>
</body>

</html>
