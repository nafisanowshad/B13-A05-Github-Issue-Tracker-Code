<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Main</title>

    <!-- favicon connect -->
    <link rel="shortcut icon" href="./assets/icon-fav.png" type="image/x-icon">

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style.css">

    <!-- tailwind+daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-slate-50 min-h-screen">
    <!-- navbar -->
    <div class="navbar bg-[#FFFFFF] py-4 px-4 md:px-20 grid grid-cols-1 md:grid-cols-2 space-y-3 shadow-md sticky top-0 z-50 ">
        <div class="navbar-logo flex items-center gap-2 ">
            <img src="./assets/github-logo.png" alt="" class="w-9 h-9">
            <h1 class="font-semibold text-lg md:text-2xl text-[#1F2937]">GitHub Issues Tracker</h1>
        </div>
        <div class="navbar-search md:flex gap-2 md:flex-row">
            <label class="input w-5/9 md:w-full">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="searchBox" type="search" required  placeholder="Search issues..." />
            </label>

            <button id="newIssueBtn" class="btn btn-primary text-white">Search</button>
        </div>
    </div>
    <!-- main-section -->
    <div class="main-section w-10/12 lg:w-11/12 mx-auto pt-14">

        <!-- button section -->
        <div
            class="buttons bg-[#FFFFFF]  mx-auto flex gap-2 p-4 drop-shadow-xl rounded-lg ">
            <button onclick="currentState(allBtn)" id="allBtn"
                class="btn btn-primary w-[80px] sm:w-[120px] hover:bg-indigo-400 hover:text-white ">All</button>
            <button onclick="currentState(openBtn)" id="openBtn"
                class="btn w-[80px] sm:w-[120px] hover:bg-indigo-400 hover:text-white">Open</button>
            <button onclick="currentState(closedBtn)" id="closedBtn"
                class="btn w-[80px] sm:w-[120px] hover:bg-indigo-400 hover:text-white ">Closed</button>
        </div>

        <!-- issues section -->
        <div class="issues mt-4 p-6 space-y-3 bg-white  rounded-lg md:flex justify-between border-b border-[#E4E4E7]">
            <div class="right-side flex gap-4">
                <div class="issue-logo bg-[#ECE4FF] w-[50px] h-[50px] rounded-full flex justify-center items-center">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-[#1F2937] font-semibold text-xl"><span id="issueNumber">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="left-side flex gap-4 justify-end">
                <div class="flex gap-2 items-center">
                    <div class="text-[#1F2937] font-medium
            text-base"><i class="fa-solid fa-circle text-[#00A96E]"></i> Open
                    </div>
                </div>
                <div class="flex gap-2 items-center">
                    <div class="text-[#1F2937] font-medium text-base"><i class="fa-solid fa-circle text-[#A855F7]"></i>
                        Closed
                    </div>
                </div>

            </div>
        </div>

        <!--cards section  -->
        <div id="issueCardSection"
            class="w-10/12 lg:w-11.5/12 mx-auto cards-container p-6 bg-[#f8fafc] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 justify-items-center">
            <!-- card -->

        </div>

    </div>

    <!-- Modal Box -->
    <dialog id="issueModal" class="modal">
        <div class="bg-white rounded-xl p-8 shadow-xl  w-[85%] md:w-[60%] lg:w-[40%]">
            <h3 id="modalTitle" class="text-3xl font-bold text-[#1F2937]">Fix broken image uploads</h3>

            <div class="flex items-center gap-2 mt-3 text-[#64748B] text-[12px]">
                <p id="modalStatus" class=" badge rounded-full bg-[#00A96E] text-white">Opened</p>
                <span>•</span>
                <p id="modalOpenBy">Fahim Ahmed</p>
                <span>•</span>
                <span id="modalOpenDate">22/02/2026</span>
            </div>

            <div id="modalLabels" class="flex gap-2 mt-4">
            </div>

            <p id="modalDescription" class="py-6 text-[#64748B]">
                The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.
            </p>

            <div class="bg-base-200 p-5 rounded-lg flex  gap-[70px] sm:gap-[150px] lg:gap-[200px]">
                <div>
                    <p class="text-gray-500">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold">Fahim Ahmed</p>
                </div>

                <div>
                    <p class="text-[#64748B] mb-2">Priority:</p>
                    <span id="modalPriority" class="badge bg-[#EF4444] text-white">HIGH</span>
                </div>

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-[#4A00FF]  text-white focus:outline-none">Close</button>
                </form>
            </div>

        </div>
    </dialog>

    <!-- loading spinner -->

    <div id="loadingSpinner" class=" w-[50%] h-2/3 mx-auto flex  items-start pt-32 justify-center hidden">
        <span class="loading loading-spinner loading-xs"></span>
        <span class="loading loading-spinner loading-sm"></span>
        <span class="loading loading-spinner loading-md"></span>
        <span class="loading loading-spinner loading-lg"></span>
        <span class="loading loading-spinner loading-xl border"></span>
    </div>


    <script src="./script.js"></script>
    <script src="./function.js"></script>
</body>

</html>
